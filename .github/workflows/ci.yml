name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_DATABASE: xbox_shop_test
          MARIADB_USER: xbox_shop
          MARIADB_PASSWORD: test-password
          MARIADB_ROOT_PASSWORD: root-password
        ports: ["3306:3306"]
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, mbstring
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - run: composer lint
      - run: composer test
        env:
          TEST_DB_HOST: 127.0.0.1
          TEST_DB_PORT: 3306
          TEST_DB_NAME: xbox_shop_test
          TEST_DB_USER: xbox_shop
          TEST_DB_PASS: test-password
